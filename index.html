<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">

    <title>Pintada</title>
    <meta name="description"
        content="Junte-se à Pintada! Compartilhe momentos, participe de conversas e descubra o que está em alta na nova rede social.">
    <meta name="author" content="Pintada">

    <meta name="theme-color" content="#F4B41A">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Pintada">

    <meta property="og:type" content="website">
    <meta property="og:url" content="https://pintada.netlify.app/">
    <meta property="og:title" content="Pintada 🐆 - A sua nova rede social">
    <meta property="og:description" content="Compartilhe momentos, participe de conversas e divirta-se!">
    <meta property="og:image" content="https://pintada.netlify.app/pintada_ico.png">
    <meta property="og:site_name" content="Pintada">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:url" content="https://pintada.netlify.app/">
    <meta name="twitter:title" content="Pintada 🐆 - A sua nova rede social">
    <meta name="twitter:description" content="Compartilhe momentos, participe de conversas e divirta-se!">
    <meta name="twitter:image" content="https://pintada.netlify.app/pintada_ico.png">
    <title>Pintada</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="shortcut icon" href="pintada_ico.png" type="image/x-icon">
    <link rel="manifest" href="manifest.json">
</head>

<body>

    <nav class="navbar">
        <div class="nav-brand" style="display: flex; align-items: center; gap: 12px;">
            <a href="index.html"
                style="display: flex; text-decoration: none; outline: none; border: none; background: transparent;">
                <img src="pintada.png" alt="Logo Pintada"
                    style="width: 80px; height: 80px; border-radius: 50%; object-fit: cover; margin: -10px 0; flex-shrink: 0; border: none;">
            </a>
        </div>

        <div class="nav-search">
            <span class="material-symbols-outlined search-icon">search</span>
            <input type="text" placeholder="Pesquisar na rede...">
        </div>

        <div class="nav-actions">
            <button class="icon-btn" id="theme-toggle" title="Alternar Tema">
                <span class="material-symbols-outlined" id="theme-icon">dark_mode</span>
            </button>

            <a href="profile.html" class="profile-pic" title="Meu Perfil">
                <img src="data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs=" alt="Perfil" class="skeleton"
                    style="background: var(--hover-bg);">
            </a>
        </div>
    </nav>

    <div class="layout-grid">

        <aside class="sidebar-left">
            <div class="sidebar-menu">
                <a href="index.html" class="menu-item active">
                    <span class="material-symbols-outlined">home</span>
                    <span class="menu-text">Início</span>
                </a>
                <a href="explore.html" class="menu-item">
                    <span class="material-symbols-outlined">explore</span>
                    <span class="menu-text">Explorar</span>
                </a>
                <a href="notifications.html" class="menu-item">
                    <span class="material-symbols-outlined">notifications</span>
                    <span class="menu-text">Notificações</span>
                </a>
                <a href="messages.html" class="menu-item">
                    <span class="material-symbols-outlined">mail</span>
                    <span class="menu-text">Mensagens</span>
                </a>
                <a href="profile.html" class="menu-item">
                    <span class="material-symbols-outlined">person</span>
                    <span class="menu-text">Perfil</span>
                </a>
                <a href="games.html" class="menu-item">
                    <span class="material-symbols-outlined">sports_esports</span>
                    <span class="menu-text">Jogos</span>
                </a>
                <a href="settings.html" class="menu-item">
                    <span class="material-symbols-outlined">settings</span>
                    <span class="menu-text">Configurações</span>
                </a>
            </div>
        </aside>

        <main class="feed-container">

            <section class="create-post">
                <div class="create-post-header">
                    <img src="data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs=" alt="Seu Perfil"
                        class="post-avatar skeleton" style="background: var(--hover-bg);">
                    <textarea id="post-input" placeholder="O que você quer compartilhar na Pintada?"></textarea>
                </div>

                <div id="emoji-panel" class="media-panel" style="display: none;"></div>
                <div id="gif-panel" class="media-panel" style="display: none;">
                    <input type="text" id="gif-search-input" placeholder="Pesquisar no Giphy...">
                    <div id="gif-results" class="media-results"></div>
                </div>
                <div id="poll-panel" class="media-panel" style="display: none; padding: 16px;">
                    <input type="text" id="poll-question-input" placeholder="Faça uma pergunta...">
                    <div id="poll-options-container"></div>
                    <button id="add-poll-opt-btn" class="btn-outline"> + Adicionar opção</button>
                </div>

                <div id="media-preview-wrapper" style="margin-top: 10px;">

                    <div id="post-preview-container" style="display: none; position: relative;">
                        <img id="post-preview-img"
                            style="width: 100%; max-height: 250px; object-fit: cover; border-radius: 12px; border: 1px solid var(--border-color);">
                        <button id="remove-preview" class="remove-media-btn">&times;</button>
                    </div>

                    <div id="selected-gif-preview" style="display: none; position: relative;">
                        <img src=""
                            style="max-height: 200px; border-radius: 12px; border: 1px solid var(--border-color);">
                        <button id="remove-gif-btn" class="remove-media-btn">&times;</button>
                    </div>
                    <div id="post-audio-preview" style="display: none; position: relative;" class="audio-preview-card">
                        <span class="material-symbols-outlined" style="color: var(--brand-color);">mic</span>
                        <audio id="post-audio-player-preview" controls
                            style="height: 30px; flex-grow: 1; outline: none;"></audio>
                        <button id="remove-audio-btn" class="remove-media-btn"
                            style="position: static; width: 24px; height: 24px; margin-left: 8px;">&times;</button>
                    </div>

                </div>

                <hr style="border: none; border-top: 1px solid var(--border-color); margin: 15px 0;">

                <div class="create-post-footer"
                    style="display: flex; justify-content: space-between; align-items: center;">
                    <div class="create-post-tools" style="display: flex; gap: 12px;">
                        <label for="post-image-input" class="tool-btn" title="Adicionar Imagem">
                            <span class="material-symbols-outlined">image</span>
                        </label>
                        <input type="file" id="post-image-input" accept="image/*" hidden>

                        <button class="tool-btn" id="post-audio-btn" title="Gravar Áudio">
                            <span class="material-symbols-outlined" id="mic-icon">mic</span>
                        </button>
                        <button class="tool-btn" id="add-emoji-btn"><span
                                class="material-symbols-outlined">sentiment_satisfied</span></button>
                        <button class="tool-btn" id="add-gif-btn"><span
                                class="material-symbols-outlined">gif_box</span></button>
                        <button class="tool-btn" id="add-poll-btn"><span
                                class="material-symbols-outlined">poll</span></button>
                    </div>

                    <div style="display: flex; align-items: center; gap: 15px;">
                        <div id="char-counter" style="font-size: 0.8rem; color: var(--text-muted);">0 / 1000</div>
                        <button class="btn-primary" id="publish-btn">Postar</button>
                    </div>
                </div>
            </section>

            <div id="posts-render-area"></div>

        </main>

        <aside class="sidebar-right">
            <div class="widget">
                <h3 class="widget-title">O que está acontecendo</h3>

                <div class="trending-item">
                    <span class="trending-meta skeleton"
                        style="width: 120px; height: 12px; display: block; margin-bottom: 8px; border-radius: 4px;"></span>
                    <h4 class="trending-title skeleton"
                        style="width: 180px; height: 18px; display: block; margin-bottom: 6px; border-radius: 4px;">
                    </h4>
                    <span class="trending-stats skeleton"
                        style="width: 70px; height: 12px; display: block; border-radius: 4px;"></span>
                </div>

                <div class="trending-item">
                    <span class="trending-meta skeleton"
                        style="width: 100px; height: 12px; display: block; margin-bottom: 8px; border-radius: 4px;"></span>
                    <h4 class="trending-title skeleton"
                        style="width: 150px; height: 18px; display: block; margin-bottom: 6px; border-radius: 4px;">
                    </h4>
                    <span class="trending-stats skeleton"
                        style="width: 60px; height: 12px; display: block; border-radius: 4px;"></span>
                </div>

                <div class="trending-item">
                    <span class="trending-meta skeleton"
                        style="width: 130px; height: 12px; display: block; margin-bottom: 8px; border-radius: 4px;"></span>
                    <h4 class="trending-title skeleton"
                        style="width: 160px; height: 18px; display: block; margin-bottom: 6px; border-radius: 4px;">
                    </h4>
                    <span class="trending-stats skeleton"
                        style="width: 80px; height: 12px; display: block; border-radius: 4px;"></span>
                </div>
            </div>
        </aside>

    </div>

    <nav class="mobile-bottom-nav">
        <a href="index.html" class="mobile-item active" active><span class="material-symbols-outlined">home</span></a>
        <a href="explore.html" class="mobile-item"><span class="material-symbols-outlined">explore</span></a>
        <a href="notifications.html" class="mobile-item"><span
                class="material-symbols-outlined">notifications</span></a>
        <a href="profile.html" class="mobile-item"><span class="material-symbols-outlined">person</span></a>
        <a href="messages.html" class="mobile-item"><span class="material-symbols-outlined">mail</span></a>
        <a href="games.html" class="mobile-item"><span class="material-symbols-outlined">sports_esports</span></a>
        <a href="settings.html" class="mobile-item"><span class="material-symbols-outlined">settings</span></a>
    </nav>

    <script type="module" src="js/firebase-config.js"></script>
    <script src="js/theme.js"></script>
    <script type="module" src="js/services.js"></script>
    <script type="module" src="js/ui.js"></script>
    <script type="module" src="js/feed.js"></script>
</body>

</html>
