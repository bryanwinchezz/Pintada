<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bem-Vindo | Pintada </title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="shortcut icon" href="pintada_ico.png" type="image/x-icon">
</head>

<body class="auth-body">

    <div class="auth-container">
        <div class="auth-card" id="login-section">
            <div class="auth-header">
                <img src="pintada.png" alt="Logo Pintada" style="width: 150px; height: 150px; border-radius: 50%; object-fit: cover; margin: -10px 0; flex-shrink: 0;">
                <h2>Entrar na Pintada</h2>
                <p>Bem-vindo de volta à Pintada!</p>
            </div>
            <form id="login-form" class="settings-form">
                <div class="form-group">
                    <label>E-mail ou Usuário</label>
                    <input type="text" id="login-identifier" required placeholder="seu@email.com ou joaosilva">
                </div>
                <div class="form-group">
                    <label>Senha</label>
                    <div style="position: relative; display: flex; align-items: center;">
                        <input type="password" id="login-password" required placeholder="••••••••" style="padding-right: 40px; width: 100%;">
                        <span class="material-symbols-outlined toggle-password" style="position: absolute; right: 10px; cursor: pointer; color: var(--text-muted); user-select: none; transition: 0.2s;">visibility_off</span>
                    </div>
                </div>
                <button type="submit" class="btn-primary" style="width: 100%; margin-top: 10px;">Entrar</button>
            </form>
            <div class="auth-footer">
                <p>Não tem uma conta? <a href="#" id="show-register">Cadastre-se</a></p>
            </div>
        </div>

        <div class="auth-card" id="register-section" style="display: none;">
            <div class="auth-header">
                <img src="pintada.png" alt="Logo Pintada" style="width: 150px; height: 150px; border-radius: 50%; object-fit: cover; margin: -10px 0; flex-shrink: 0;">
                <h2>Junte-se à Pintada</h2>
                <p>Crie sua conta na Pintada.</p>
            </div>
            <form id="register-form" class="settings-form">
                <div class="form-group">
                    <label>Nome Completo</label>
                    <input type="text" id="reg-name" required placeholder="Ex: João Silva">
                </div>
                <div class="form-group">
                    <label>Nome de Usuário</label>
                    <input type="text" id="reg-username" required placeholder="Ex: joaosilva">
                </div>
                <div class="form-group">
                    <label>E-mail</label>
                    <input type="email" id="reg-email" required placeholder="seu@email.com">
                </div>
                <div class="form-group">
                    <label>Senha</label>
                    <div style="position: relative; display: flex; align-items: center;">
                        <input type="password" id="reg-password" required minlength="6" placeholder="Crie uma senha forte" style="padding-right: 40px; width: 100%;">
                        <span class="material-symbols-outlined toggle-password" style="position: absolute; right: 10px; cursor: pointer; color: var(--text-muted); user-select: none; transition: 0.2s;">visibility_off</span>
                    </div>
                    <small style="color: var(--text-muted); font-size: 0.8rem; display: block; margin-top: 4px;">A senha deve ter pelo menos 6 caracteres.</small>
                </div>
                <button type="submit" class="btn-primary" style="width: 100%; margin-top: 10px;">Criar Conta</button>
            </form>
            <div class="auth-footer">
                <p>Já tem uma conta? <a href="#" id="show-login">Faça login</a></p>
            </div>
        </div>
    </div>

    <script type="module" src="js/firebase-config.js"></script>
    <script src="js/theme.js"></script>
    <script type="module" src="js/services.js"></script>
    <script type="module" src="js/ui.js"></script>
</body>

</html>
